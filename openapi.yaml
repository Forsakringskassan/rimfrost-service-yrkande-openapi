openapi: 3.0.3
info:
  title: Yrkande API
  version: 1.0.0
  description: API för att hantera yrkanden.

paths:
  /yrkande:
    post:
      tags: [YrkandeController]
      operationId: postYrkande
      summary: Skapar ett nytt yrkande
      description: Skapar ett nytt yrkande
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostYrkandeRequest'
            example:
              erbjudandeId: "a3b9c7b8-1234-4567-89ab-123456789abc"  
              yrkandeFrom: "2025-01-01T00:00:00Z"
              yrkandeTom: "2025-01-02T00:00:00Z"
              individYrkandeRoller:
                - individId: "58435904-c2b6-4b1f-a0ab-62f1839d8ff2"
                  yrkandeRollId: "58435904-c2b6-4b1f-a0ab-62f1839d8ff2"
              yrkatResultat:
                - from: "2025-01-01T00:00:00Z"
                  tom: "2025-01-02T00:00:00Z"
                  typ: "ERSATTNING"
                  data: "{}"
      responses:
        '201':
          description: Skapat yrkande OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostYrkandeResponse'

  /yrkande/{yrkandeId}:
    get:
      tags: [ YrkandeController ]
      operationId: getYrkande
      summary: Hämtar ett yrkande
      description: Hämtar ett yrkande baserat på dess unika ID
      parameters:
        - name: yrkandeId
          in: path
          required: true
          description: Yrkandets unika ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Yrkande hittat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Yrkande'
        '404':
          description: Yrkande hittades inte
    put: 
      tags: [YrkandeController]
      operationId: putYrkande
      summary: Uppdatera ett yrkande
      description: Uppdaterar ett befintligt yrkande
      parameters:
        - name: yrkandeId
          in: path
          required: true
          description: Yrkandets unika ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutYrkandeRequest'
      responses:
        '200':
          description: Yrkande uppdaterat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutYrkandeResponse'
        '400':
          description: Bad request
        '404':
          description: Yrkande hittades inte

  /yrkande/{yrkandeId}/handlaggning:
    post:
      tags: [ YrkandeController ]
      operationId: postHandlaggning
      summary: Skapa en ny handläggning
      description: Skapa en ny handläggning för ett specifikt yrkande
      parameters:
        - name: yrkandeId
          in: path
          required: true
          description: Yrkandets unika ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                yrkandeId:
                  type: string
                  format: uuid
                  description: Yrkandets id
              required:
                - yrkandeId
      responses:
        '201':
          description: Handläggning skapat OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlaggningResponse'
        '400':
          description: Bad request (t.ex. felaktigt yrkandeId)

  /yrkande/{yrkandeId}/handlaggning/{handlaggningId}:
    get:
      tags: [ YrkandeController ]
      operationId: getHandlaggning
      summary: Hämta handläggning
      description: Hämta handläggning knutet till handlaggningId
      parameters:
        - name: yrkandeId
          in: path
          required: true
          description: Yrkandets unika ID
          schema:
            type: string
            format: uuid
        - name: handlaggningId
          in: path
          required: true
          description: Handläggningens id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Handläggning hämtat OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandlaggningResponse'
        '400':
          description: Bad request (t.ex. felaktigt handlaggningId)
    put:
      tags: [ YrkandeController ]
      operationId: putHandlaggning
      summary: Uppdatera handläggning
      description: Uppdatera handläggning knutet till handlaggningId
      parameters:
        - name: handlaggningId
          in: path
          required: true
          description: Handläggningens id
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutHandlaggningRequest'
      responses:
        '200':
          description: Handläggning uppdaterad OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutHandlaggningResponse'
        '400':
          description: Bad request (t.ex. felaktigt handlaggningId)

components:
  schemas:
    Yrkande:
      type: object
      description: Yrkande
      properties:
        id:
          type: string
          description: Yrkandets unika ID
          format: uuid
        erbjudandeId:
          type: string
          description: Erbjudandets unika ID
          format: uuid
        version:
          type: integer
          description: Yrkandets version
        yrkandedatum:
          type: string
          description: Datetime när yrkandet uppstod, enligt ISO 8601
          format: date-time
        yrkandestatus:
          $ref: '#/components/schemas/Yrkandestatus'
        yrkandeFrom:
          type: string
          format: date-time
          description: Yrkande från och med datum
        yrkandeTom:
          type: string
          format: date-time
          description: Yrkande till och med datum
        avsikt:
          $ref: '#/components/schemas/Avsiktstyp'
        individYrkandeRoller:
          type: array
          description: Lista av personer involverade i yrkandet samt deras roll
          items:
            $ref: '#/components/schemas/IndividYrkandeRoll'
        yrkatResultat:
          type: array
          description: Lista av yrkade resultat
          items:
            $ref: '#/components/schemas/YrkatResultat'
        handlaggning:
          $ref: '#/components/schemas/HandlaggningUpdate'
      required:
        - id
        - erbjudandeId
        - version
        - yrkandedatum
        - yrkandestatus
        - yrkandeFrom
        - yrkandeTom
        - avsikt
        - individYrkandeRoller
        - yrkatResultat

    Yrkandestatus:
      type: string
      description: Yrkandestatus
      enum:
        - PLANERAT
        - YRKAT
        - UNDER_UTREDNING
        - FASTSTALLT_UNDER_UTREDNING
        - FASTSTALLT

    Avsiktstyp:
      type: string
      description: Avsiktstyp
      enum:
        - NY
        - ANDRING
        - BORTTAG
        - ATERTAGEN

    YrkatResultat:
      type: object
      description: Yrkat resultat kopplat till ett yrkande
      properties:
        id:
          type: string
          format: uuid
          description: Yrkat resultatets unika ID
        version:
          type: integer
          description: Version av yrkat resultat
        from:
          type: string
          format: date-time
          description: Startdatum/tid då resultatet gäller från, enligt ISO 8601
        tom:
          type: string
          format: date-time
          description: Slutdatum/tid då resultatet gäller till, enligt ISO 8601
        typ:
          type: string
          description: Specificerar vilket typ av resultat objekt
        data:
          type: string
          description: Json data av den typ som har angetts
      required:
        - id
        - version
        - from
        - tom
        - typ
        - data

    Handlaggning:
      type: object
      description: Handläggning, ärendeinstans
      properties:
        id:
          type: string
          description: Handläggningens unika ID
          format: uuid
        version:
          type: string
          description: Handläggningens version
        yrkandeId:
          type: string
          description: Yrkandets unika ID
          format: uuid
        processinstansId:
          type: string
          description: BPMN processinstansens unika ID
          format: uuid
        skapadTS:
          type: string
          description: DateTime när handläggning skapades, enligt ISO 8601
          format: date-time
        avslutadTS:
          type: string
          description: DateTime när handläggning avslutades, enligt ISO 8601
          format: date-time
        handlaggningspecifikation:
          $ref: '#/components/schemas/Handlaggningspecifikation'
        uppgift:
          $ref: '#/components/schemas/Uppgift'
      required:
        - id
        - version
        - yrkandeId
        - processinstansId

    HandlaggningUpdate:
      type: object
      description: Handläggning, ärendeinstans
      properties:
        id:
          type: string
          description: Handläggningens unika ID
          format: uuid
        version:
          type: string
          description: Handläggningens version
        yrkandeId:
          type: string
          description: Yrkandets unika ID
          format: uuid
        processinstansId:
          type: string
          description: BPMN processinstansens unika ID
          format: uuid
        skapadTS:
          type: string
          description: DateTime när handläggning skapades, enligt ISO 8601
          format: date-time
        avslutadTS:
          type: string
          description: DateTime när handläggning avslutades, enligt ISO 8601
          format: date-time
        handlaggningspecifikation:
          $ref: '#/components/schemas/Handlaggningspecifikation'
        uppgift:
          $ref: '#/components/schemas/UppgiftUpdate'
      required:
        - id
        - version
        - yrkandeId
        - processinstansId

    UppgiftStatus:
      type: string
      description: Uppgiftens status
      enum:
        - PLANERAD
        - TILLDELAD
        - AVSLUTAD

    Handlaggningspecifikation:
      type: object
      description: Handläggningspecifikation, ärendeslag
      properties:
        id:
          type: string
          description: Handläggningspecifikationens unika ID
          format: uuid
        version:
          type: string
          description: Handläggningspecifikationens version
        bpmn:
          type: string
          description: BPMN processbeskrivning
        namn:
          type: string
          description: Namnet på handläggningspecifikationen
        beskrivning:
          type: string
          description: Beskrivning av handläggningspecifikationen
      required:
        - id
        - version
        - namn
        - beskrivning

    Uppgift:
      type: object
      description: Uppgift
      properties:
        id:
          type: string
          description: Uppgiftens ID
          format: uuid
        version:
          type: string
          description: Uppgiftens version
        skapadTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften skapades, enligt ISO 8601
        utfordTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften utfördes, enligt ISO 8601
          nullable: true
        planeradTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften är planerad att utföras, enligt ISO 8601
          nullable: true
        utforarId:
          type: string
          description: Utförarens ID
          format: uuid
          nullable: true
        aktivitetId:
          type: string
          description: Aktivitetens Id
          format: uuid
        uppgiftStatus:
          $ref: '#/components/schemas/UppgiftStatus'
        FSSAinformation:
          $ref: '#/components/schemas/FSSAinformation'
        resultat:
          type: array
          description: Ett eller flera resultat av uppgiften
          items:
            $ref: '#/components/schemas/Resultat'
      required:
        - id
        - version
        - handlaggningId
        - uppgiftStatus

    UppgiftUpdate:
      type: object
      description: Uppgift
      properties:
        id:
          type: string
          description: Uppgiftens ID
          format: uuid
        version:
          type: string
          description: Uppgiftens version
        skapadTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften skapades, enligt ISO 8601
        utfordTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften utfördes, enligt ISO 8601
          nullable: true
        planeradTs:
          type: string
          format: date-time
          description: Tidpunkt då uppgiften är planerad att utföras, enligt ISO 8601
          nullable: true
        utforarId:
          type: string
          description: Utförarens ID
          format: uuid
          nullable: true
        aktivitetId:
          type: string
          description: Aktivitetens Id
          format: uuid
        uppgiftStatus:
          $ref: '#/components/schemas/UppgiftStatus'
        FSSAinformation:
          $ref: '#/components/schemas/FSSAinformation'
        underlag:
          type: array
          description: Ett eller flera underlag som uppgiften använder sig av
          items:
            $ref: '#/components/schemas/Underlag'
        resultat:
          type: array
          description: Ett eller flera resultat av uppgiften
          items:
            $ref: '#/components/schemas/Resultat'
      required:
        - id
        - version
        - handlaggningId
        - uppgiftStatus

    Underlag:
      type: object
      properties:
        typ:
          type: string
          description: Specificerar vilken typ av underlag det är
        version:
          type: string
          description: Specificerar vilken version av underlags typ det är
        data:
          type: string
          description: All data i underlaget i formatet JSON
      required:
        - typ
        - version
        - data

    Resultat:
      type: object
      properties:
        typ:
          type: string
          description: Specificerar vilken typ av resultat det är
        version:
          type: string
          description: Specificerar vilken version av resultatet det är
        data:
          type: string
          description: All data i resultatet i formatet JSON
      required:
        - typ
        - version
        - data

    FSSAinformation:
      type: string
      enum:
        - HANDLAGGNING_PAGAR
        - VANTAR_PA_INFO_FRAN_ANNAN_PART
        - VANTAR_PA_INFO_FRAN_KUND

    PostYrkandeRequest:
      type: object
      description: Data som krävs för att skapa ett nytt yrkande
      properties:
        erbjudandeId:
          type: string
          format: uuid
          description: Vilket erbjudande yrkandet avser
        yrkandeFrom:
          type: string
          format: date-time
          description: Yrkande från och med datum
        yrkandeTom:
          type: string
          format: date-time
          description: Yrkande till och med datum
        individYrkandeRoller:
          type: array
          description: Lista av personer involverade i yrkandet samt deras roll
          items:
            $ref: '#/components/schemas/IndividYrkandeRoll'
        yrkatResultat:
          type: array
          description: Lista av yrkat resultat
          items:
            $ref: '#/components/schemas/YrkatResultatCreate'
      required:
        - erbjudandeId
        - yrkandeFrom
        - yrkandeTom
        - individYrkandeRoller
        - yrkatResultat
       
    PostYrkandeResponse:
      type: object
      description: Svar vid skapande av ett nytt yrkande
      properties:
        yrkande:
          $ref: '#/components/schemas/Yrkande'
      required:
        - yrkande

    PutYrkandeRequest:
      type: object
      description: Object för att uppdatera ett yrkande
      properties:
        version:
          type: integer
          description: Yrkandets version
        yrkandeFrom:
          type: string
          format: date-time
          description: Yrkande från och med datum
        yrkandeTom:
          type: string
          format: date-time
          description: Yrkande till och med datum
        yrkandestatus:
          $ref: '#/components/schemas/Yrkandestatus'
        avsikt:
          $ref: '#/components/schemas/Avsiktstyp'
        individYrkandeRoller:
          type: array
          description: Lista av personer involverade i yrkandet samt deras roll
          items:
            $ref: '#/components/schemas/IndividYrkandeRoll'
        yrkatResultat:
          type: array
          description: Lista av yrkat resultat
          items:
            $ref: '#/components/schemas/YrkatResultatCreate'
        handlaggning:
          $ref: '#/components/schemas/HandlaggningUpdate'
      required:
        - version
        - yrkandeFrom
        - yrkandeTom
        - yrkandestatus
        - avsikt
        - individYrkandeRoller
        - yrkatResultat

    PutYrkandeResponse:
      type: object
      description: Svar efter att ett yrkande uppdaterats
      properties:
        yrkande:
          $ref: '#/components/schemas/Yrkande'
      required:
        - yrkande

    IndividYrkandeRoll:
      type: object
      description: Representerar en individ tillsammans med dess roll
      properties:
        individId:
          type: string
          format: uuid
          description: Id till en individ
        yrkandeRollId:
          type: string
          format: uuid
          description: Id till en yrkande roll
      required:
        - individId
        - yrkandeRollId

    YrkatResultatCreate:
      type: object
      description: Data som behövs för att skapa ett yrkat resultat
      properties:
        from:
          type: string
          format: date-time
          description: Yrkat från och med datum
        tom:
          type: string
          format: date-time
          description: Yrkat till och med datum
        typ:
          type: string
          description: Specificerar vilket typ av resultat objekt
        data:
          type: string
          description: Json data av den typ som har angetts
      required:
        - from
        - tom
        - typ
        - data

    Beslutsutfall:
      type: string
      description: Beslutsutfall för ersättning
      enum:
        - JA
        - NEJ
        - FU

    HandlaggningResponse:
      type: object
      description: Svar vid skapande/hämtning av handläggning
      properties:
        handlaggning:
          $ref: '#/components/schemas/Handlaggning'
      required:
        - handlaggning

    PutHandlaggningRequest:
      type: object
      description: Uppdatera handläggning
      properties:
        handlaggning:
          $ref: '#/components/schemas/HandlaggningUpdate'

    PutHandlaggningResponse:
      type: object
      description: Svar vid uppdatering av handläggning
      properties:
        handlaggning:
          $ref: '#/components/schemas/HandlaggningUpdate'
      required:
        - handlaggning